<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تفاصيل المنتج | رفيق</title>
<style>
:root {
  --p: #0ea5e9;
  --s: #6366f1;
  --g: #10b981;
  --r: #ef4444;
  --bg: #0f172a;
  --card: #1e293b;
  --card-border: rgba(255, 255, 255, 0.08);
  --text: #f8fafc;
  --muted: #94a3b8;
  --input-bg: rgba(15, 23, 42, 0.85);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

body {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.12), transparent 70%);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
}

.container {
  max-width: 860px;
  margin: 0 auto;
}

.nav-top {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.nav-top a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 10px;
  background: rgba(30, 41, 59, 0.6);
  border: 1px solid var(--card-border);
  transition: all 0.2s;
}

.nav-top a:hover {
  color: #fff;
  border-color: var(--p);
  background: rgba(14, 165, 233, 0.15);
}

.alert {
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 18px;
  display: none;
  font-size: 0.88rem;
  font-weight: 600;
}

.alert.show { display: block; }
.alert.success { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.35); color: var(--g); }
.alert.error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.35); color: var(--r); }

.product-card {
  background: var(--card);
  border-radius: 20px;
  padding: 24px 18px;
  border: 1px solid var(--card-border);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

.product-image {
  background: linear-gradient(135deg, #1e293b, #0f172a);
  border-radius: 16px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5rem;
  border: 1px solid rgba(255,255,255,0.05);
}

.product-details {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.product-details h1 {
  font-size: clamp(1.4rem, 4vw, 1.8rem);
  font-weight: 800;
  color: #f8fafc;
}

.price-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.price {
  font-size: 1.6rem;
  font-weight: 900;
  color: #38bdf8;
}

.old-price {
  text-decoration: line-through;
  color: var(--muted);
  font-size: 1rem;
}

.desc {
  color: #cbd5e1;
  font-size: 0.9rem;
  line-height: 1.6;
}

.meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.meta-item {
  background: rgba(14, 165, 233, 0.12);
  border: 1px solid rgba(14, 165, 233, 0.2);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 0.78rem;
  color: #38bdf8;
  font-weight: 600;
}

.order-form {
  background: rgba(15, 23, 42, 0.8);
  border-radius: 16px;
  padding: 18px 14px;
  border: 1px solid rgba(14, 165, 233, 0.25);
  margin-top: 10px;
}

.order-form h3 {
  font-size: 1rem;
  font-weight: 800;
  margin-bottom: 12px;
  color: #f1f5f9;
}

.form-group {
  margin-bottom: 12px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  color: #cbd5e1;
  font-size: 0.8rem;
  font-weight: 600;
}

.form-group input, .form-group textarea {
  width: 100%;
  height: 46px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: var(--input-bg);
  color: #fff;
  font-size: 16px;
}

.form-group textarea {
  height: auto;
  min-height: 60px;
  padding: 8px 12px;
}

.btn-primary {
  width: 100%;
  height: 48px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, var(--p), var(--s));
  color: #fff;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-top: 8px;
  box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 25px rgba(14, 165, 233, 0.45);
}

.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

@media (max-width: 700px) {
  body { padding: 10px 8px; }
  .product-card { grid-template-columns: 1fr; padding: 16px 12px; }
  .product-image { height: 200px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="nav-top">
    <a href="/">🏠 الرئيسية</a>
    <a href="/store/apply">🏪 طلب توكيل</a>
  </div>

  <div id="alertBox" class="alert"></div>

  <div class="product-card">
    <div class="product-image">📦</div>
    <div class="product-details">
      <h1 id="productName">جاري التحميل...</h1>
      <div class="price-row">
        <span class="price" id="productPrice"></span>
        <span class="old-price" id="productOldPrice"></span>
      </div>
      <p class="desc" id="productDesc"></p>
      
      <div class="meta">
        <span class="meta-item">📦 المتوفر: <span id="productStock">0</span></span>
        <span class="meta-item">👁️ المشاهدات: <span id="productViews">0</span></span>
        <span class="meta-item">🛒 المبيعات: <span id="productSales">0</span></span>
      </div>

      <div style="font-size:0.85rem;color:var(--muted)">
        🏪 التاجر المميز: <a id="storeLink" href="#" style="color:#38bdf8;font-weight:700;text-decoration:none"></a>
      </div>

      <div class="order-form">
        <h3>🛒 تقديم طلب شراء مباشر</h3>
        <form id="orderForm">
          <input type="hidden" id="orderProductId">
          <div class="form-group">
            <label>الكمية المطلوبة</label>
            <input type="number" id="orderQty" value="1" min="1" required>
          </div>
          <div class="form-group">
            <label>الاسم الكامل *</label>
            <input type="text" id="orderName" required placeholder="اسم المستلم الثلاثي">
          </div>
          <div class="form-group">
            <label>رقم الهاتف للتواصل *</label>
            <input type="tel" id="orderPhone" required placeholder="01xxxxxxxx">
          </div>
          <div class="form-group">
            <label>البريد الإلكتروني (اختياري)</label>
            <input type="email" id="orderEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>عنوان التوصيل بالتفصيل</label>
            <textarea id="orderAddress" rows="2" placeholder="المدينة، الشارع، رقم المبنى..."></textarea>
          </div>
          <div class="form-group">
            <label>ملاحظات إضافية</label>
            <textarea id="orderNotes" rows="2" placeholder="أي تفاصيل خاصة بالطرد أو التوصيل..."></textarea>
          </div>
          <button type="submit" class="btn-primary" id="orderBtn">تأكيد طلب الشراء 🚀</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
const productSlug = '{{ product_slug }}';
let productData = null;

function showAlert(msg, isError = false) {
  const box = document.getElementById('alertBox');
  box.className = 'alert ' + (isError ? 'error' : 'success') + ' show';
  box.textContent = msg;
}

async function loadProduct() {
  try {
    const res = await fetch('/api/store/product/' + productSlug + '?_t=' + Date.now());
    if(!res.ok) return;
    const data = await res.json();
    if(data.error) { document.getElementById('productName').textContent = 'المنتج غير موجود'; return; }
    
    productData = data.product;
    document.getElementById('productName').textContent = data.product.name;
    document.getElementById('productPrice').textContent = Number(data.product.price).toLocaleString() + ' ' + (data.product.currency || 'ج.م');
    if(data.product.old_price) {
      document.getElementById('productOldPrice').textContent = Number(data.product.old_price).toLocaleString() + ' ' + (data.product.currency || 'ج.م');
    }
    document.getElementById('productDesc').textContent = data.product.description || 'لا يوجد وصف متاح';
    document.getElementById('productStock').textContent = data.product.stock;
    document.getElementById('productViews').textContent = data.product.views;
    document.getElementById('productSales').textContent = data.product.sales;
    document.getElementById('storeLink').textContent = data.store.name;
    document.getElementById('storeLink').href = '/store/' + data.store.slug;
    document.getElementById('orderProductId').value = data.product.id;
  } catch(e) { console.error(e); }
}

document.getElementById('orderForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.textContent = 'جاري إرسال الطلب...';
  
  const qty = parseInt(document.getElementById('orderQty').value);
  if(productData && qty > productData.stock) {
    showAlert('❌ الكمية المطلوبة غير متوفرة حالياً في المخزون', true);
    btn.disabled = false; 
    btn.textContent = 'تأكيد طلب الشراء 🚀';
    return;
  }
  
  try {
    const res = await fetch('/api/store/order', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        product_id: parseInt(document.getElementById('orderProductId').value),
        quantity: qty,
        buyer_name: document.getElementById('orderName').value,
        buyer_phone: document.getElementById('orderPhone').value,
        buyer_email: document.getElementById('orderEmail').value,
        buyer_address: document.getElementById('orderAddress').value,
        notes: document.getElementById('orderNotes').value
      })
    });
    const result = await res.json();
    if(res.ok && result.success) {
      showAlert('✅ تم تقديم طلبك بنجاح! رقم المتابعة: #' + result.order_id);
      document.getElementById('orderForm').reset();
      loadProduct();
    } else {
      showAlert('❌ ' + (result.error || 'حدث خطأ أثناء تقديم الطلب'), true);
    }
  } catch(e) { 
    showAlert('❌ تعذر الاتصال بالسيرفر', true); 
  }
  btn.disabled = false;
  btn.textContent = 'تأكيد طلب الشراء 🚀';
};

loadProduct();
setInterval(loadProduct, 3500);
</script>
</body>
</html>
