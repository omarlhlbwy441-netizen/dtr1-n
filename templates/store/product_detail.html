<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتج | رفيق</title>
<style>
:root{--p:#0ea5e9;--s:#8b5cf6;--g:#10b981;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:32px 20px}
.product-card{background:var(--card);border-radius:20px;padding:32px;border:1px solid rgba(255,255,255,0.06);display:grid;grid-template-columns:1fr 1fr;gap:32px}
.product-image{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:16px;height:400px;display:flex;align-items:center;justify-content:center;font-size:6em}
.product-details{display:flex;flex-direction:column;gap:16px}
.product-details h1{font-size:1.8em}
.product-details .price{font-size:2em;font-weight:800;color:var(--p)}
.product-details .old-price{text-decoration:line-through;color:var(--muted);font-size:1.1em}
.product-details .desc{color:var(--muted);line-height:1.7}
.product-details .meta{display:flex;gap:16px;flex-wrap:wrap}
.meta-item{background:rgba(14,165,233,0.08);padding:8px 16px;border-radius:10px;font-size:0.85em;color:var(--muted)}
.btn{padding:14px 28px;border-radius:12px;border:none;cursor:pointer;font-size:1em;font-weight:700;transition:all 0.3s}
.btn-primary{background:linear-gradient(90deg,var(--p),var(--s));color:#fff;width:100%}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(14,165,233,0.3)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.order-form{background:rgba(14,165,233,0.05);border-radius:16px;padding:24px;border:1px solid rgba(14,165,233,0.2);margin-top:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:var(--muted);font-size:0.85em}
.form-group input,.form-group textarea{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(15,23,42,0.8);color:#fff}
.nav{display:flex;gap:20px;margin-bottom:30px;justify-content:center}
.nav a{color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:8px;transition:all 0.3s}
.nav a:hover{color:var(--p);background:rgba(14,165,233,0.1)}
.alert{padding:16px;border-radius:12px;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert.success{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:var(--g)}
.alert.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
@media(max-width:768px){.product-card{grid-template-columns:1fr}.product-image{height:250px}}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a href="/">🏠 الرئيسية</a>
    <a href="/store/apply">🏪 كن تاجراً</a>
  </nav>
  <div id="alertBox" class="alert"></div>
  <div class="product-card" id="productCard">
    <div class="product-image">📦</div>
    <div class="product-details">
      <h1 id="productName">جاري التحميل...</h1>
      <div>
        <span class="price" id="productPrice"></span>
        <span class="old-price" id="productOldPrice"></span>
      </div>
      <p class="desc" id="productDesc"></p>
      <div class="meta">
        <span class="meta-item">📦 المخزون: <span id="productStock"></span></span>
        <span class="meta-item">👁️ المشاهدات: <span id="productViews"></span></span>
        <span class="meta-item">🛒 المبيعات: <span id="productSales"></span></span>
      </div>
      <div style="margin-top:8px;color:var(--muted);font-size:0.9em">
        🏪 <a id="storeLink" href="#" style="color:var(--p);text-decoration:none"></a>
      </div>
      <div class="order-form">
        <h3 style="margin-bottom:16px">🛒 طلب شراء</h3>
        <form id="orderForm">
          <input type="hidden" id="orderProductId">
          <div class="form-group">
            <label>الكمية</label>
            <input type="number" id="orderQty" value="1" min="1" required>
          </div>
          <div class="form-group">
            <label>الاسم الكامل *</label>
            <input type="text" id="orderName" required placeholder="اسمك الثلاثي">
          </div>
          <div class="form-group">
            <label>رقم الهاتف *</label>
            <input type="tel" id="orderPhone" required placeholder="01xxxxxxxx">
          </div>
          <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="orderEmail" placeholder="optional@email.com">
          </div>
          <div class="form-group">
            <label>العنوان</label>
            <textarea id="orderAddress" rows="2" placeholder="عنوان التوصيل..."></textarea>
          </div>
          <div class="form-group">
            <label>ملاحظات</label>
            <textarea id="orderNotes" rows="2" placeholder="أي ملاحظات خاصة..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" id="orderBtn">تأكيد الطلب</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
const productSlug = '{{ product_slug }}';
let productData = null;
function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.className = 'alert ' + type + ' show';
  box.textContent = msg;
  setTimeout(() => box.classList.remove('show'), 5000);
}
async function loadProduct() {
  try {
    const res = await fetch('/api/store/product/' + productSlug);
    const data = await res.json();
    if(data.error) { document.getElementById('productName').textContent = 'المنتج غير موجود'; return; }
    productData = data.product;
    document.getElementById('productName').textContent = data.product.name;
    document.getElementById('productPrice').textContent = data.product.price.toLocaleString() + ' ' + data.product.currency;
    if(data.product.old_price) document.getElementById('productOldPrice').textContent = data.product.old_price.toLocaleString() + ' ' + data.product.currency;
    document.getElementById('productDesc').textContent = data.product.description || 'لا يوجد وصف';
    document.getElementById('productStock').textContent = data.product.stock;
    document.getElementById('productViews').textContent = data.product.views;
    document.getElementById('productSales').textContent = data.product.sales;
    document.getElementById('storeLink').textContent = data.store.name;
    document.getElementById('storeLink').href = '/store/' + data.store.slug;
    document.getElementById('orderProductId').value = data.product.id;
  } catch(e) { console.error(e); }
}
document.getElementById('orderForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الإرسال...';
  const qty = parseInt(document.getElementById('orderQty').value);
  if(qty > productData.stock) {
    showAlert('❌ الكمية المطلوبة غير متوفرة', 'error');
    btn.disabled = false; btn.textContent = 'تأكيد الطلب'; return;
  }
  try {
    const res = await fetch('/api/store/order', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        product_id: parseInt(document.getElementById('orderProductId').value),
        quantity: qty,
        buyer_name: document.getElementById('orderName').value,
        buyer_phone: document.getElementById('orderPhone').value,
        buyer_email: document.getElementById('orderEmail').value,
        buyer_address: document.getElementById('orderAddress').value,
        notes: document.getElementById('orderNotes').value
      })
    });
    const result = await res.json();
    if(result.success) {
      showAlert('✅ تم تقديم طلبك بنجاح! رقم الطلب: ' + result.order_id, 'success');
      document.getElementById('orderForm').reset();
      loadProduct();
    } else {
      showAlert('❌ ' + (result.error || 'حدث خطأ'), 'error');
    }
  } catch(e) { showAlert('❌ خطأ في الاتصال', 'error'); }
  btn.disabled = false;
  btn.textContent = 'تأكيد الطلب';
};
loadProduct();
</script>
</body>
</html>
