<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة التوكيلات | رفيق</title>
<style>
:root{--p:#0ea5e9;--s:#8b5cf6;--g:#10b981;--r:#ef4444;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:32px 20px}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:2.2em;background:linear-gradient(90deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);margin-top:8px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--card);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.06);text-align:center}
.stat-card .value{font-size:1.8em;font-weight:800;color:var(--p)}
.stat-card .label{color:var(--muted);font-size:0.85em;margin-top:4px}
.tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:8px}
.tab-btn{padding:10px 20px;border-radius:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:0.9em;transition:all 0.3s}
.tab-btn:hover,.tab-btn.active{background:rgba(14,165,233,0.1);color:var(--p)}
.section{background:var(--card);border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.06)}
.table{width:100%;border-collapse:collapse;margin-top:16px}
.table th{text-align:right;padding:12px;color:var(--muted);font-size:0.8em;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06);text-transform:uppercase;letter-spacing:0.5px}
.table td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.9em}
.table tr:hover td{background:rgba(14,165,233,0.03)}
.badge{padding:4px 10px;border-radius:20px;font-size:0.7em;font-weight:700}
.badge-pending{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-approved{background:rgba(16,185,129,0.15);color:var(--g)}
.badge-rejected{background:rgba(239,68,68,0.15);color:var(--r)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:0.8em;font-weight:600;transition:all 0.3s}
.btn-success{background:var(--g);color:#fff}
.btn-danger{background:var(--r);color:#fff}
.btn:hover{transform:translateY(-1px);opacity:0.9}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:20px;padding:32px;width:90%;max-width:500px;border:1px solid rgba(255,255,255,0.1);max-height:90vh;overflow-y:auto}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:var(--muted);font-size:0.85em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(15,23,42,0.8);color:#fff}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.nav{display:flex;gap:20px;margin-bottom:30px;justify-content:center}
.nav a{color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:8px;transition:all 0.3s}
.nav a:hover{color:var(--p);background:rgba(14,165,233,0.1)}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a href="/">🏠 الرئيسية</a>
    <a href="/admin/stores">🏪 التوكيلات</a>
  </nav>

  <div class="header">
    <h1>🏪 إدارة التوكيلات التجارية</h1>
    <p>مراجعة وإدارة طلبات التجار والمتاجر</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="value" id="statUsers">0</div><div class="label">المستخدمين</div></div>
    <div class="stat-card"><div class="value" id="statStores">0</div><div class="label">المتاجر</div></div>
    <div class="stat-card"><div class="value" id="statPending">0</div><div class="label">قيد المراجعة</div></div>
    <div class="stat-card"><div class="value" id="statProducts">0</div><div class="label">المنتجات</div></div>
    <div class="stat-card"><div class="value" id="statOrders">0</div><div class="label">الطلبات</div></div>
    <div class="stat-card"><div class="value" id="statRevenue">0</div><div class="label">الإيرادات</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('pending', this)">⏳ قيد المراجعة</button>
    <button class="tab-btn" onclick="showTab('approved', this)">✅ المعتمدة</button>
    <button class="tab-btn" onclick="showTab('rejected', this)">❌ المرفوضة</button>
  </div>

  <div class="section" id="applicationsSection">
    <div id="applicationsList"></div>
  </div>
</div>

<!-- Approve Modal -->
<div class="modal" id="approveModal">
  <div class="modal-content">
    <h3 style="margin-bottom:20px">✅ الموافقة على الطلب</h3>
    <form id="approveForm">
      <input type="hidden" id="approveAppId">
      <div class="form-group"><label>اسم المتجر</label><input type="text" id="approveStoreName" readonly style="opacity:0.6"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>المساحات المعتمدة</label><input type="number" name="approved_slots" value="1" min="1" required></div>
        <div class="form-group"><label>الرسوم الشهرية (ج.م)</label><input type="number" name="monthly_fee" value="500" min="0" step="50" required></div>
      </div>
      <div class="form-group"><label>نسبة العمولة (%)</label><input type="number" name="commission_rate" value="5" min="0" max="50" step="0.5" required></div>
      <div class="form-group"><label>شروط العقد</label><textarea name="contract_terms" rows="4" required>عقد توكيل تجاري لعرض المنتجات في منصة رفيق. يلتزم الطرف الأول (التاجر) بجودة المنتجات والالتزام بالسياسات المعتمدة.</textarea></div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
        <button type="button" class="btn" style="background:rgba(255,255,255,0.1);color:var(--muted)" onclick="closeModal('approveModal')">إلغاء</button>
        <button type="submit" class="btn btn-success">اعتماد الطلب</button>
      </div>
    </form>
  </div>
</div>

<!-- Reject Modal -->
<div class="modal" id="rejectModal">
  <div class="modal-content">
    <h3 style="margin-bottom:20px;color:var(--r)">❌ رفض الطلب</h3>
    <form id="rejectForm">
      <input type="hidden" id="rejectAppId">
      <div class="form-group"><label>سبب الرفض</label><textarea name="reason" rows="4" required placeholder="اذكر سبب رفض الطلب..."></textarea></div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
        <button type="button" class="btn" style="background:rgba(255,255,255,0.1);color:var(--muted)" onclick="closeModal('rejectModal')">إلغاء</button>
        <button type="submit" class="btn btn-danger">رفض الطلب</button>
      </div>
    </form>
  </div>
</div>

<script>
let currentTab = 'pending';

function showTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadApplications(tab);
}

async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats');
    const data = await res.json();
    document.getElementById('statUsers').textContent = data.users;
    document.getElementById('statStores').textContent = data.stores;
    document.getElementById('statPending').textContent = data.pending_applications;
    document.getElementById('statProducts').textContent = data.products;
    document.getElementById('statOrders').textContent = data.orders;
    document.getElementById('statRevenue').textContent = data.revenue.toLocaleString() + ' ج.م';
  } catch(e) { console.error(e); }
}

async function loadApplications(status) {
  try {
    const res = await fetch('/api/admin/applications?status=' + status);
    const apps = await res.json();
    const container = document.getElementById('applicationsList');
    if(!apps.length) {
      container.innerHTML = '<div class="empty-state"><div style="font-size:3em;margin-bottom:12px">📭</div><p>لا توجد طلبات ' + (status==='pending'?'قيد المراجعة':status==='approved'?'معتمدة':'مرفوضة') + '</p></div>';
      return;
    }
    container.innerHTML = '<table class="table"><thead><tr><th>المتجر</th><th>النوع</th><th>المساحات</th><th>التاجر</th><th>التاريخ</th><th>إجراءات</th></tr></thead><tbody>' +
      apps.map(a => '<tr><td><strong>' + a.store_name + '</strong><br><small style="color:var(--muted)">' + a.slug + '</small></td><td>' + a.business_type + '</td><td>' + a.requested_slots + '</td><td>' + a.user.username + '<br><small style="color:var(--muted)">' + a.user.email + '</small></td><td style="color:var(--muted);font-size:0.85em">' + new Date(a.created_at).toLocaleDateString('ar-EG') + '</td><td>' + (status==='pending'?'<button class="btn btn-success" style="margin-left:4px" onclick="openApprove(' + a.id + ', '' + a.store_name + '')">✓</button><button class="btn btn-danger" onclick="openReject(' + a.id + ')">✕</button>':'<span class="badge badge-' + status + '">' + (status==='approved'?'معتمد':'مرفوض') + '</span>') + '</td></tr>').join('') + '</tbody></table>';
  } catch(e) { console.error(e); }
}

function openApprove(id, name) {
  document.getElementById('approveAppId').value = id;
  document.getElementById('approveStoreName').value = name;
  document.getElementById('approveModal').classList.add('show');
}

function openReject(id) {
  document.getElementById('rejectAppId').value = id;
  document.getElementById('rejectModal').classList.add('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.getElementById('approveForm').onsubmit = async (e) => {
  e.preventDefault();
  const id = document.getElementById('approveAppId').value;
  const data = Object.fromEntries(new FormData(e.target));
  try {
    const res = await fetch('/api/admin/applications/' + id + '/approve', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    const result = await res.json();
    if(result.success) { closeModal('approveModal'); loadApplications(currentTab); loadStats(); }
  } catch(e) { console.error(e); }
};

document.getElementById('rejectForm').onsubmit = async (e) => {
  e.preventDefault();
  const id = document.getElementById('rejectAppId').value;
  const data = Object.fromEntries(new FormData(e.target));
  try {
    await fetch('/api/admin/applications/' + id + '/reject', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    closeModal('rejectModal'); loadApplications(currentTab); loadStats();
  } catch(e) { console.error(e); }
};

// Close modals on backdrop click
document.querySelectorAll('.modal').forEach(m => {
  m.onclick = (e) => { if(e.target === m) m.classList.remove('show'); };
});

loadStats();
loadApplications('pending');
</script>
</body>
</html>
