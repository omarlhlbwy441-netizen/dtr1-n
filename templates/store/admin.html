<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>إدارة التوكيلات | رفيق</title>
<style>
:root {
  --p: #0ea5e9;
  --s: #6366f1;
  --g: #10b981;
  --r: #ef4444;
  --bg: #0f172a;
  --card: #1e293b;
  --card-border: rgba(255, 255, 255, 0.08);
  --text: #f8fafc;
  --muted: #94a3b8;
  --input-bg: rgba(15, 23, 42, 0.85);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

body {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.12), transparent 70%);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

.nav-top {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.nav-top a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 10px;
  background: rgba(30, 41, 59, 0.6);
  border: 1px solid var(--card-border);
  transition: all 0.2s;
}

.nav-top a:hover {
  color: #fff;
  border-color: var(--p);
  background: rgba(14, 165, 233, 0.15);
}

.header {
  text-align: center;
  margin-bottom: 24px;
}

.header h1 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800;
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.header p {
  color: var(--muted);
  font-size: 0.9rem;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px 12px;
  border: 1px solid var(--card-border);
  text-align: center;
}

.stat-card .value {
  font-size: 1.5rem;
  font-weight: 900;
  color: #38bdf8;
}

.stat-card .label {
  color: var(--muted);
  font-size: 0.78rem;
  margin-top: 4px;
  font-weight: 600;
}

.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  background: rgba(15, 23, 42, 0.7);
  padding: 4px;
  border-radius: 14px;
  border: 1px solid var(--card-border);
  overflow-x: auto;
}

.tab-btn {
  flex: 1;
  min-width: 100px;
  padding: 10px 8px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: 700;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab-btn.active {
  background: linear-gradient(90deg, var(--p), var(--s));
  color: #fff;
  box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
}

.section {
  background: var(--card);
  border-radius: 20px;
  padding: 20px 16px;
  border: 1px solid var(--card-border);
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  overflow-x: auto;
}

.table-responsive {
  width: 100%;
  overflow-x: auto;
}

.table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}

.table th {
  text-align: right;
  padding: 12px;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 700;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  text-transform: uppercase;
}

.table td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.88rem;
  vertical-align: middle;
}

.badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 800;
  display: inline-block;
}

.badge-pending { background: rgba(245, 158, 11, 0.18); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
.badge-approved { background: rgba(16, 185, 129, 0.18); color: var(--g); border: 1px solid rgba(16, 185, 129, 0.3); }
.badge-rejected { background: rgba(239, 68, 68, 0.18); color: var(--r); border: 1px solid rgba(239, 68, 68, 0.3); }

.btn {
  padding: 8px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 700;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: 38px;
}

.btn-success { background: var(--g); color: #fff; }
.btn-danger { background: var(--r); color: #fff; }
.btn:hover { transform: translateY(-1px); opacity: 0.9; }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 16px;
}

.modal.show { display: flex; }

.modal-content {
  background: var(--card);
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  border: 1px solid var(--card-border);
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  color: #cbd5e1;
  font-size: 0.82rem;
  font-weight: 600;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  height: 46px;
  padding: 0 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.12);
  background: var(--input-bg);
  color: #fff;
  font-size: 16px;
}

.form-group textarea {
  height: auto;
  min-height: 80px;
  padding: 10px 14px;
}

.empty-state {
  text-align: center;
  padding: 40px 16px;
  color: var(--muted);
}

@media (max-width: 600px) {
  body { padding: 10px 8px; }
  .section { padding: 16px 10px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="container">
  <div class="nav-top">
    <a href="/">🏠 الرئيسية</a>
    <a href="/admin/stores">⚙️ إدارة التوكيلات</a>
  </div>

  <div class="header">
    <h1>⚙️ لوحة إدارة التوكيلات التجارية</h1>
    <p>مراجعة طلبات الانضمام والموافقة على مساحات التجار</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="value" id="statUsers">0</div><div class="label">المستخدمين</div></div>
    <div class="stat-card"><div class="value" id="statStores">0</div><div class="label">المتاجر النشطة</div></div>
    <div class="stat-card"><div class="value" id="statPending">0</div><div class="label">طلبات المعاينة</div></div>
    <div class="stat-card"><div class="value" id="statProducts">0</div><div class="label">المنتجات</div></div>
    <div class="stat-card"><div class="value" id="statOrders">0</div><div class="label">الطلبات</div></div>
    <div class="stat-card"><div class="value" id="statRevenue">0</div><div class="label">الإيرادات</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('pending', this)">⏳ قيد المراجعة</button>
    <button class="tab-btn" onclick="showTab('approved', this)">✅ المعتمدة</button>
    <button class="tab-btn" onclick="showTab('rejected', this)">❌ المرفوضة</button>
  </div>

  <div class="section" id="applicationsSection">
    <div class="table-responsive">
      <div id="applicationsList"></div>
    </div>
  </div>
</div>

<!-- Approve Modal -->
<div class="modal" id="approveModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px;font-size:1.1rem">✅ اعتماد طلب التوكيل</h3>
    <form id="approveForm">
      <input type="hidden" id="approveAppId">
      <div class="form-group"><label>اسم المتجر</label><input type="text" id="approveStoreName" readonly style="opacity:0.7"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>المساحات المعتمدة</label><input type="number" name="approved_slots" value="1" min="1" required></div>
        <div class="form-group"><label>الرسوم الشهرية (ج.م)</label><input type="number" name="monthly_fee" value="500" min="0" step="50" required></div>
      </div>
      <div class="form-group"><label>نسبة العمولة (%)</label><input type="number" name="commission_rate" value="5" min="0" max="50" step="0.5" required></div>
      <div class="form-group"><label>شروط العقد</label><textarea name="contract_terms" rows="3" required>عقد توكيل تجاري رسمي لعرض وبيع المنتجات عبر منصة رفيق.</textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
        <button type="button" class="btn" style="background:rgba(255,255,255,0.1);color:var(--muted)" onclick="closeModal('approveModal')">إلغاء</button>
        <button type="submit" class="btn btn-success">اعتماد فوراً</button>
      </div>
    </form>
  </div>
</div>

<!-- Reject Modal -->
<div class="modal" id="rejectModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px;color:var(--r);font-size:1.1rem">❌ رفض الطلب</h3>
    <form id="rejectForm">
      <input type="hidden" id="rejectAppId">
      <div class="form-group"><label>سبب الرفض</label><textarea name="reason" rows="3" required placeholder="يرجى توضيح سبب الرفض..."></textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
        <button type="button" class="btn" style="background:rgba(255,255,255,0.1);color:var(--muted)" onclick="closeModal('rejectModal')">إلغاء</button>
        <button type="submit" class="btn btn-danger">تأكيد الرفض</button>
      </div>
    </form>
  </div>
</div>

<script>
let currentTab = 'pending';

function showTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadApplications(tab);
}

async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats?_t=' + Date.now());
    if(!res.ok) return;
    const data = await res.json();
    document.getElementById('statUsers').textContent = data.users;
    document.getElementById('statStores').textContent = data.stores;
    document.getElementById('statPending').textContent = data.pending_applications;
    document.getElementById('statProducts').textContent = data.products;
    document.getElementById('statOrders').textContent = data.orders;
    document.getElementById('statRevenue').textContent = Number(data.revenue).toLocaleString() + ' ج.م';
  } catch(e) { console.error(e); }
}

async function loadApplications(status) {
  try {
    const res = await fetch('/api/admin/applications?status=' + status + '&_t=' + Date.now());
    if(!res.ok) return;
    const apps = await res.json();
    const container = document.getElementById('applicationsList');
    
    if(!apps || !apps.length) {
      container.innerHTML = '<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:8px">📭</div><p>لا توجد طلبات ' + (status==='pending'?'قيد المراجعة':status==='approved'?'معتمدة':'مرفوضة') + '</p></div>';
      return;
    }
    
    container.innerHTML = `
      <table class="table">
        <thead>
          <tr>
            <th>المتجر</th>
            <th>النشاط</th>
            <th>المساحات</th>
            <th>التاجر</th>
            <th>التاريخ</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody>
          ${apps.map(a => `
            <tr>
              <td><strong>${escapeHtml(a.store_name)}</strong><br><small style="color:var(--muted)">${a.slug}</small></td>
              <td>${escapeHtml(a.business_type)}</td>
              <td>${a.requested_slots}</td>
              <td>${escapeHtml(a.user ? a.user.username : 'غير معروف')}<br><small style="color:var(--muted)">${escapeHtml(a.user ? a.user.email : '')}</small></td>
              <td style="color:var(--muted);font-size:0.8rem">${new Date(a.created_at).toLocaleDateString('ar-EG')}</td>
              <td>
                ${status === 'pending' ? `
                  <button class="btn btn-success" onclick="openApprove(${a.id}, '${escapeHtml(a.store_name)}')">✓ قبول</button>
                  <button class="btn btn-danger" onclick="openReject(${a.id})">✕ رفض</button>
                ` : `
                  <span class="badge badge-${status}">${status === 'approved' ? 'معتمد' : 'مرفوض'}</span>
                `}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch(e) { console.error(e); }
}

function escapeHtml(str) {
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, function(m) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
  });
}

function openApprove(id, name) {
  document.getElementById('approveAppId').value = id;
  document.getElementById('approveStoreName').value = name;
  document.getElementById('approveModal').classList.add('show');
}

function openReject(id) {
  document.getElementById('rejectAppId').value = id;
  document.getElementById('rejectModal').classList.add('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.getElementById('approveForm').onsubmit = async (e) => {
  e.preventDefault();
  const id = document.getElementById('approveAppId').value;
  const data = Object.fromEntries(new FormData(e.target));
  try {
    const res = await fetch('/api/admin/applications/' + id + '/approve', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    const result = await res.json();
    if(result.success) { 
      closeModal('approveModal'); 
      loadApplications(currentTab); 
      loadStats(); 
    }
  } catch(e) { console.error(e); }
};

document.getElementById('rejectForm').onsubmit = async (e) => {
  e.preventDefault();
  const id = document.getElementById('rejectAppId').value;
  const data = Object.fromEntries(new FormData(e.target));
  try {
    await fetch('/api/admin/applications/' + id + '/reject', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    closeModal('rejectModal'); 
    loadApplications(currentTab); 
    loadStats();
  } catch(e) { console.error(e); }
};

document.querySelectorAll('.modal').forEach(m => {
  m.onclick = (e) => { if(e.target === m) m.classList.remove('show'); };
});

loadStats();
loadApplications('pending');

// Live polling every 3.5 seconds
setInterval(loadStats, 3500);
setInterval(() => loadApplications(currentTab), 3500);
</script>
</body>
</html>
