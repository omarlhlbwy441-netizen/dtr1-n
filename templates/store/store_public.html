<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر | رفيق</title>
<style>
:root{--p:#0ea5e9;--s:#8b5cf6;--g:#10b981;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:32px 20px}
.store-header{background:linear-gradient(135deg,rgba(14,165,233,0.1),rgba(139,92,246,0.1));border-radius:20px;padding:40px;margin-bottom:32px;border:1px solid rgba(255,255,255,0.06);text-align:center}
.store-header h1{font-size:2.5em;margin-bottom:8px}
.store-header p{color:var(--muted);font-size:1.1em}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.product-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);transition:all 0.3s;cursor:pointer}
.product-card:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.3);border-color:rgba(14,165,233,0.2)}
.product-image{height:200px;background:linear-gradient(135deg,#1e293b,#0f172a);display:flex;align-items:center;justify-content:center;font-size:4em}
.product-info{padding:20px}
.product-info h3{font-size:1.1em;margin-bottom:8px}
.product-info .price{font-size:1.3em;font-weight:700;color:var(--p)}
.product-info .old-price{text-decoration:line-through;color:var(--muted);font-size:0.9em;margin-right:8px}
.product-info .category{color:var(--muted);font-size:0.8em;margin-top:4px}
.nav{display:flex;gap:20px;margin-bottom:30px;justify-content:center}
.nav a{color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:8px;transition:all 0.3s}
.nav a:hover{color:var(--p);background:rgba(14,165,233,0.1)}
.empty-state{text-align:center;padding:60px;color:var(--muted)}
.empty-state .icon{font-size:4em;margin-bottom:16px}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a href="/">🏠 الرئيسية</a>
    <a href="/store/apply">🏪 كن تاجراً</a>
  </nav>
  <div class="store-header" id="storeHeader">
    <div style="font-size:4em;margin-bottom:16px">🏪</div>
    <h1 id="storeName">جاري التحميل...</h1>
    <p id="storeDesc"></p>
  </div>
  <h2 style="margin-bottom:20px">🛍️ المنتجات</h2>
  <div class="products-grid" id="productsGrid">
    <div class="empty-state"><div class="icon">⏳</div><p>جاري تحميل المنتجات...</p></div>
  </div>
</div>
<script>
const storeSlug = '{{ store_slug }}';
async function loadStore() {
  try {
    const res = await fetch('/api/store/store/' + storeSlug);
    const data = await res.json();
    if(data.error) { document.getElementById('storeName').textContent = 'المتجر غير موجود'; return; }
    document.getElementById('storeName').textContent = data.store.name;
    document.getElementById('storeDesc').textContent = data.store.description || '';
    const grid = document.getElementById('productsGrid');
    if(!data.products.length) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">🛍️</div><p>لا توجد منتجات في هذا المتجر بعد</p></div>';
      return;
    }
    grid.innerHTML = data.products.map(p => `
      <div class="product-card" onclick="window.location.href='/product/${p.slug}'">
        <div class="product-image">📦</div>
        <div class="product-info">
          <h3>${p.name}</h3>
          <div>
            <span class="price">${p.price.toLocaleString()} ج.م</span>
            ${p.old_price ? `<span class="old-price">${p.old_price.toLocaleString()} ج.م</span>` : ''}
          </div>
          <div class="category">${p.category || 'عام'}</div>
        </div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}
loadStore();
</script>
</body>
</html>
