<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>متجر | رفيق</title>
<style>
:root {
  --p: #0ea5e9;
  --s: #6366f1;
  --g: #10b981;
  --bg: #0f172a;
  --card: #1e293b;
  --card-border: rgba(255, 255, 255, 0.08);
  --text: #f8fafc;
  --muted: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

body {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.12), transparent 70%);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
}

.nav-top {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.nav-top a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 10px;
  background: rgba(30, 41, 59, 0.6);
  border: 1px solid var(--card-border);
  transition: all 0.2s;
}

.nav-top a:hover {
  color: #fff;
  border-color: var(--p);
  background: rgba(14, 165, 233, 0.15);
}

.store-header {
  background: var(--card);
  border-radius: 20px;
  padding: 28px 18px;
  margin-bottom: 24px;
  border: 1px solid var(--card-border);
  text-align: center;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.store-header .store-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--p), var(--s));
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  margin: 0 auto 12px auto;
  box-shadow: 0 10px 25px rgba(14, 165, 233, 0.35);
}

.store-header h1 {
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 800;
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.store-header p {
  color: var(--muted);
  font-size: 0.9rem;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}

.product-card {
  background: var(--card);
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  transition: all 0.25s ease;
  cursor: pointer;
}

.product-card:hover {
  transform: translateY(-3px);
  border-color: rgba(14, 165, 233, 0.4);
  box-shadow: 0 15px 30px rgba(0,0,0,0.35);
}

.product-image {
  height: 150px;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
}

.product-info {
  padding: 14px;
}

.product-info h3 {
  font-size: 0.92rem;
  font-weight: 700;
  margin-bottom: 6px;
}

.product-info .price-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.product-info .price {
  font-size: 1.05rem;
  font-weight: 800;
  color: #38bdf8;
}

.product-info .old-price {
  text-decoration: line-through;
  color: var(--muted);
  font-size: 0.8rem;
}

.product-info .category {
  color: var(--muted);
  font-size: 0.75rem;
  margin-top: 4px;
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  grid-column: 1 / -1;
}

@media (max-width: 600px) {
  body { padding: 10px 8px; }
  .products-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <div class="nav-top">
    <a href="/">🏠 الرئيسية</a>
    <a href="/store/apply">🏪 طلب توكيل</a>
  </div>

  <div class="store-header" id="storeHeader">
    <div class="store-icon">🏪</div>
    <h1 id="storeName">جاري تحميل المتجر...</h1>
    <p id="storeDesc"></p>
  </div>

  <h2 style="margin-bottom:16px;font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:8px">
    🛍️ منتجات المتجر
  </h2>

  <div class="products-grid" id="productsGrid">
    <div class="empty-state">⏳ جاري تحميل منتجات المتجر...</div>
  </div>
</div>

<script>
const storeSlug = '{{ store_slug }}';

async function loadStore() {
  try {
    const res = await fetch('/api/store/store/' + storeSlug + '?_t=' + Date.now());
    if(!res.ok) return;
    const data = await res.json();
    if(data.error) { document.getElementById('storeName').textContent = 'المتجر غير موجود'; return; }
    
    document.getElementById('storeName').textContent = data.store.name;
    document.getElementById('storeDesc').textContent = data.store.description || 'أهلاً بك في متجرنا الرقمي المعتمد في منصة رفيق';
    
    const grid = document.getElementById('productsGrid');
    if(!data.products || !data.products.length) {
      grid.innerHTML = '<div class="empty-state">🛍️ لا توجد منتجات معروضة في هذا المتجر حالياً</div>';
      return;
    }
    
    grid.innerHTML = data.products.map(p => `
      <div class="product-card" onclick="window.location.href='/product/${p.slug}'">
        <div class="product-image">📦</div>
        <div class="product-info">
          <h3>${escapeHtml(p.name)}</h3>
          <div class="price-row">
            <span class="price">${Number(p.price).toLocaleString()} ج.م</span>
            ${p.old_price ? `<span class="old-price">${Number(p.old_price).toLocaleString()} ج.م</span>` : ''}
          </div>
          <div class="category">${escapeHtml(p.category || 'عام')}</div>
        </div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

function escapeHtml(str) {
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, function(m) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
  });
}

loadStore();
setInterval(loadStore, 3500);
</script>
</body>
</html>
