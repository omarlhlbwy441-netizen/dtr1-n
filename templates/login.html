<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | رفيق</title>
<style>
:root{--p:#0ea5e9;--s:#8b5cf6;--g:#10b981;--r:#ef4444;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.container{max-width:450px;margin:auto;padding:32px 20px;width:100%}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:2.5em;background:linear-gradient(90deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:var(--muted);font-size:0.95em}
.card{background:var(--card);border-radius:20px;padding:32px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
.tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(15,23,42,0.6);padding:6px;border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
.tab-btn{flex:1;padding:12px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:0.95em;font-weight:600;transition:all 0.3s}
.tab-btn.active{background:linear-gradient(90deg,var(--p),var(--s));color:#fff;box-shadow:0 4px 15px rgba(14,165,233,0.3)}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;color:var(--muted);font-size:0.85em;font-weight:500}
.form-group input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(15,23,42,0.8);color:#fff;font-size:0.95em;transition:border-color 0.3s}
.form-group input:focus{outline:none;border-color:var(--p)}
.btn-submit{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--p),var(--s));color:#fff;font-size:1em;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:10px;box-shadow:0 10px 25px rgba(14,165,233,0.3)}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 15px 35px rgba(14,165,233,0.4)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.alert{padding:12px 16px;border-radius:10px;margin-bottom:20px;display:none;font-size:0.9em}
.alert.show{display:block}
.alert.success{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:var(--g)}
.alert.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:var(--r)}
.nav{display:flex;gap:20px;margin-bottom:24px;justify-content:center}
.nav a{color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:8px;transition:all 0.3s}
.nav a:hover{color:var(--p);background:rgba(14,165,233,0.1)}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a href="/">🏠 الرئيسية</a>
  </nav>

  <div class="header">
    <h1>🏪 رفيق</h1>
    <p>منصة التجارة الذكية</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="loginTabBtn" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="tab-btn" id="registerTabBtn" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label>اسم المستخدم أو البريد الإلكتروني</label>
        <input type="text" name="username" required placeholder="ادخل اسم المستخدم أو البريد">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit" id="loginSubmitBtn">دخول</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none">
      <div class="form-group">
        <label>اسم المستخدم *</label>
        <input type="text" name="username" required placeholder="اختر اسم مستخدم">
      </div>
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" name="full_name" placeholder="اسمك الكامل">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني *</label>
        <input type="email" name="email" required placeholder="name@example.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور *</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit" id="registerSubmitBtn">إنشاء حساب</button>
    </form>
  </div>
</div>

<script>
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginBtn = document.getElementById('loginTabBtn');
  const regBtn = document.getElementById('registerTabBtn');
  const alertBox = document.getElementById('alertBox');
  alertBox.className = 'alert';
  alertBox.style.display = 'none';

  if (tab === 'login') {
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
    loginBtn.classList.add('active');
    regBtn.classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    registerForm.style.display = 'block';
    loginBtn.classList.remove('active');
    regBtn.classList.add('active');
  }
}

function showAlert(msg, isError = false) {
  const alertBox = document.getElementById('alertBox');
  alertBox.textContent = msg;
  alertBox.className = 'alert show ' + (isError ? 'error' : 'success');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'جاري التحقق...';

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (res.ok && result.success) {
      showAlert('تم تسجيل الدخول بنجاح! جاري التوجيه...');
      setTimeout(() => {
        window.location.href = result.redirect || '/';
      }, 800);
    } else {
      showAlert(result.error || 'خطأ في بيانات الدخول', true);
      btn.disabled = false;
      btn.textContent = 'دخول';
    }
  } catch (err) {
    showAlert('حدث خطأ أثناء الاتصال بالسيرفر', true);
    btn.disabled = false;
    btn.textContent = 'دخول';
  }
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('registerSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الإنشاء...';

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (res.ok && result.success) {
      showAlert('تم إنشاء الحساب بنجاح! يمكنك الدخول الآن.');
      setTimeout(() => {
        switchTab('login');
        btn.disabled = false;
        btn.textContent = 'إنشاء حساب';
      }, 1200);
    } else {
      showAlert(result.error || 'خطأ في إنشاء الحساب', true);
      btn.disabled = false;
      btn.textContent = 'إنشاء حساب';
    }
  } catch (err) {
    showAlert('حدث خطأ أثناء الاتصال بالسيرفر', true);
    btn.disabled = false;
    btn.textContent = 'إنشاء حساب';
  }
});
</script>
</body>
</html>
