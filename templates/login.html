<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تسجيل الدخول | رفيق</title>
<style>
:root {
  --p: #0ea5e9;
  --s: #6366f1;
  --g: #10b981;
  --r: #ef4444;
  --bg: #0f172a;
  --card: #1e293b;
  --card-border: rgba(255, 255, 255, 0.1);
  --text: #f8fafc;
  --muted: #94a3b8;
  --input-bg: rgba(15, 23, 42, 0.85);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }

body {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.15), transparent 70%);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 16px;
}

.wrapper {
  width: 100%;
  max-width: 440px;
  margin: auto;
}

.nav-top {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.nav-top a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 12px;
  background: rgba(30, 41, 59, 0.6);
  border: 1px solid var(--card-border);
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.nav-top a:hover {
  color: #fff;
  border-color: var(--p);
  background: rgba(14, 165, 233, 0.15);
}

.header {
  text-align: center;
  margin-bottom: 24px;
}

.header .logo {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--p), var(--s));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  margin: 0 auto 12px auto;
  box-shadow: 0 12px 30px rgba(14, 165, 233, 0.35);
}

.header h1 {
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.header p {
  color: var(--muted);
  font-size: 0.9rem;
}

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 28px 22px;
  border: 1px solid var(--card-border);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(12px);
}

.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  background: rgba(15, 23, 42, 0.7);
  padding: 5px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.tab-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: 12px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 700;
  transition: all 0.25s ease;
  min-height: 44px;
}

.tab-btn.active {
  background: linear-gradient(90deg, var(--p), var(--s));
  color: #fff;
  box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3);
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: #cbd5e1;
  font-size: 0.85rem;
  font-weight: 600;
}

.form-group input {
  width: 100%;
  height: 50px;
  padding: 0 16px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: var(--input-bg);
  color: #fff;
  font-size: 16px; /* Prevents auto-zoom on mobile safari/chrome */
  transition: all 0.25s ease;
}

.form-group input:focus {
  outline: none;
  border-color: var(--p);
  box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.25);
  background: rgba(15, 23, 42, 0.95);
}

.btn-submit {
  width: 100%;
  height: 50px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(90deg, var(--p), var(--s));
  color: #fff;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-top: 10px;
  box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 35px rgba(14, 165, 233, 0.45);
}

.btn-submit:active {
  transform: translateY(0);
}

.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.alert {
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: none;
  font-size: 0.88rem;
  line-height: 1.4;
  font-weight: 600;
}

.alert.show {
  display: block;
}

.alert.success {
  background: rgba(16, 185, 129, 0.15);
  border: 1px solid rgba(16, 185, 129, 0.35);
  color: var(--g);
}

.alert.error {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.35);
  color: var(--r);
}

.footer-text {
  text-align: center;
  color: var(--muted);
  font-size: 0.78rem;
  margin-top: 24px;
}

@media (max-width: 480px) {
  body {
    padding: 12px 8px;
  }
  .card {
    padding: 22px 16px;
    border-radius: 20px;
  }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="nav-top">
    <a href="/">🏠 العودة للرئيسية</a>
  </div>

  <div class="header">
    <div class="logo" style="position:relative" title="مساحة الشعار">🐺</div>
    <h1>دولة الذئب الرقمية</h1>
    <p>ادخل إلى حسابك للوصول إلى شبكة التواصل الاجتماعي، وباني المواقع، وإدارة التوكيلات والمتاجر</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="loginTabBtn" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="tab-btn" id="registerTabBtn" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label>اسم المستخدم أو البريد الإلكتروني</label>
        <input type="text" name="username" required placeholder="ادخل اسم المستخدم أو البريد" autocomplete="username">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit" id="loginSubmitBtn">دخول الحساب</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none">
      <div class="form-group">
        <label>اسم المستخدم *</label>
        <input type="text" name="username" required placeholder="اختر اسم مستخدم" autocomplete="username">
      </div>
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" name="full_name" placeholder="اسمك الكامل">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني *</label>
        <input type="email" name="email" required placeholder="name@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>كلمة المرور *</label>
        <input type="password" name="password" required placeholder="••••••••" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-submit" id="registerSubmitBtn">إنشاء حساب جديد</button>
    </form>
  </div>

  <div class="footer-text">
    🏪 رفيق | جميع الحقوق محفوظة © 2026
  </div>
</div>

<script>
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginBtn = document.getElementById('loginTabBtn');
  const regBtn = document.getElementById('registerTabBtn');
  const alertBox = document.getElementById('alertBox');
  alertBox.className = 'alert';
  alertBox.style.display = 'none';

  if (tab === 'login') {
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
    loginBtn.classList.add('active');
    regBtn.classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    registerForm.style.display = 'block';
    loginBtn.classList.remove('active');
    regBtn.classList.add('active');
  }
}

function showAlert(msg, isError = false) {
  const alertBox = document.getElementById('alertBox');
  alertBox.textContent = msg;
  alertBox.className = 'alert show ' + (isError ? 'error' : 'success');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'جاري التحقق...';

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (res.ok && result.success) {
      showAlert('تم تسجيل الدخول بنجاح! جاري التوجيه...');
      setTimeout(() => {
        window.location.href = result.redirect || '/';
      }, 800);
    } else {
      showAlert(result.error || 'خطأ في بيانات الدخول', true);
      btn.disabled = false;
      btn.textContent = 'دخول الحساب';
    }
  } catch (err) {
    showAlert('حدث خطأ أثناء الاتصال بالسيرفر', true);
    btn.disabled = false;
    btn.textContent = 'دخول الحساب';
  }
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('registerSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'جاري إنشاء الحساب...';

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (res.ok && result.success) {
      showAlert('تم إنشاء الحساب بنجاح! يمكنك الدخول الآن.');
      setTimeout(() => {
        switchTab('login');
        btn.disabled = false;
        btn.textContent = 'إنشاء حساب جديد';
      }, 1200);
    } else {
      showAlert(result.error || 'خطأ في إنشاء الحساب', true);
      btn.disabled = false;
      btn.textContent = 'إنشاء حساب جديد';
    }
  } catch (err) {
    showAlert('حدث خطأ أثناء الاتصال بالسيرفر', true);
    btn.disabled = false;
    btn.textContent = 'إنشاء حساب جديد';
  }
});
</script>
</body>
</html>
