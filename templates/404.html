<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة | رفيق</title>
<style>
:root{--p:#0ea5e9;--s:#8b5cf6;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.box{background:var(--card);border-radius:24px;padding:48px 32px;border:1px solid rgba(255,255,255,0.08);max-width:500px;width:100%}
h1{font-size:4em;background:linear-gradient(90deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
p{color:var(--muted);font-size:1.1em;margin-bottom:32px}
.btn{padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--p),var(--s));color:#fff;font-weight:700;text-decoration:none;display:inline-block;transition:transform 0.3s}
.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="box">
  <h1>404</h1>
  <p>عفواً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
  <a href="/" class="btn">🏠 العودة للرئيسية</a>
</div>
</body>
</html>
