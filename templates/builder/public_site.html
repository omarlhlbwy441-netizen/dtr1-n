<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="pageTitle">جاري تحميل الموقع...</title>
<style>
:root {
  --p: #0ea5e9;
  --s: #6366f1;
  --bg: #0f172a;
  --card: #1e293b;
  --card-border: rgba(255, 255, 255, 0.08);
  --text: #f8fafc;
  --muted: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

body.light-mode {
  --bg: #f8fafc;
  --card: #ffffff;
  --card-border: rgba(0, 0, 0, 0.08);
  --text: #0f172a;
  --muted: #64748b;
}

.site-navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
  padding: 14px 20px;
}

.light-mode .site-navbar {
  background: rgba(255, 255, 255, 0.9);
}

.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.site-logo {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--text);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}

.site-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--p), var(--s));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 1.3rem;
  box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
}

.nav-menu {
  display: flex;
  gap: 18px;
  list-style: none;
}

.nav-link {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 700;
  transition: all 0.2s;
}

.nav-link:hover { color: var(--p); }

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ── SECTIONS STYLING ── */

.section {
  padding: 70px 0;
  border-bottom: 1px solid var(--card-border);
}

/* HERO SECTION */
.hero-section {
  padding: 90px 0 70px 0;
  text-align: center;
}

.hero-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(14, 165, 233, 0.15);
  color: var(--p);
  border: 1px solid rgba(14, 165, 233, 0.3);
  font-size: 0.85rem;
  font-weight: 800;
  margin-bottom: 20px;
}

.hero-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  line-height: 1.25;
  margin-bottom: 20px;
}

.hero-subtitle {
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: var(--muted);
  max-width: 750px;
  margin: 0 auto 32px auto;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  padding: 14px 28px;
  border-radius: 14px;
  background: linear-gradient(90deg, var(--p), var(--s));
  color: #fff;
  font-size: 1rem;
  font-weight: 800;
  text-decoration: none;
  box-shadow: 0 10px 25px rgba(14, 165, 233, 0.35);
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(14, 165, 233, 0.5);
}

.btn-secondary {
  padding: 14px 28px;
  border-radius: 14px;
  background: var(--card);
  border: 1px solid var(--card-border);
  color: var(--text);
  font-size: 1rem;
  font-weight: 800;
  text-decoration: none;
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
}

.section-header {
  text-align: center;
  margin-bottom: 48px;
}

.section-title {
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  font-weight: 900;
  margin-bottom: 12px;
}

.section-subtitle {
  font-size: 1rem;
  color: var(--muted);
  max-width: 600px;
  margin: 0 auto;
}

/* GRID CARDS */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card-item {
  background: var(--card);
  border-radius: 20px;
  padding: 28px 24px;
  border: 1px solid var(--card-border);
  transition: all 0.3s;
}

.card-item:hover {
  transform: translateY(-4px);
  border-color: var(--p);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.card-icon {
  font-size: 2.2rem;
  margin-bottom: 16px;
  display: inline-block;
}

.card-title {
  font-size: 1.25rem;
  font-weight: 800;
  margin-bottom: 10px;
}

.card-desc {
  color: var(--muted);
  font-size: 0.92rem;
}

/* STATS BAR */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  text-align: center;
}

.stat-item h3 {
  font-size: 2.8rem;
  font-weight: 900;
  background: linear-gradient(90deg, var(--p), var(--s));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-item p {
  color: var(--muted);
  font-weight: 700;
  font-size: 0.95rem;
}

/* CONTACT FORM */
.contact-container {
  max-width: 650px;
  margin: 0 auto;
  background: var(--card);
  border-radius: 24px;
  padding: 32px 24px;
  border: 1px solid var(--card-border);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 0.88rem; font-weight: 700; color: var(--text); }
.form-group input, .form-group textarea {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid var(--card-border);
  background: rgba(15, 23, 42, 0.6);
  color: #fff;
  font-size: 16px;
}

.light-mode .form-group input, .light-mode .form-group textarea {
  background: #f1f5f9;
  color: #0f172a;
}

.site-footer {
  padding: 40px 0;
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
  border-top: 1px solid var(--card-border);
}

@media (max-width: 600px) {
  .section { padding: 45px 0; }
  .nav-menu { display: none; }
}
</style>
</head>
<body>

<header class="site-navbar">
  <div class="nav-container">
    <a href="#" class="site-logo">
      <div class="site-logo-icon" id="logoIcon">🌐</div>
      <span id="siteLogoName">...</span>
    </a>
    <ul class="nav-menu">
      <li><a href="#services" class="nav-link">الخدمات</a></li>
      <li><a href="#about" class="nav-link">عن الشركة</a></li>
      <li><a href="#contact" class="nav-link">تواصل معنا</a></li>
    </ul>
  </div>
</header>

<main id="sectionsContainer">
  <div style="text-align:center;padding:100px 20px;color:var(--muted)">جاري تحميل محتوى الموقع...</div>
</main>

<footer class="site-footer">
  <div class="container">
    <p id="footerText">جميع الحقوق محفوظة © 2026</p>
  </div>
</footer>

<script>
const siteSlug = "{{ site_slug }}";

async function loadPublicSite() {
  try {
    const res = await fetch('/api/builder/websites/' + siteSlug + '?_t=' + Date.now());
    if(!res.ok) {
      document.getElementById('sectionsContainer').innerHTML = '<div style="text-align:center;padding:100px;color:#ef4444;font-weight:bold">عفواً، هذا الموقع غير متاح حالياً</div>';
      return;
    }
    const data = await res.json();
    const site = data.site;
    const homePage = data.pages.find(p => p.is_home) || data.pages[0];

    // Inject CSS Theme Variables
    document.documentElement.style.setProperty('--p', site.theme_color || '#0ea5e9');
    document.documentElement.style.setProperty('--s', site.accent_color || '#6366f1');
    if(site.bg_style === 'light') {
      document.body.classList.add('light-mode');
    }

    document.getElementById('pageTitle').textContent = site.site_title || site.site_name;
    document.getElementById('siteLogoName').textContent = site.site_name;

    renderSections(homePage.sections_data || []);
  } catch(e) { console.error(e); }
}

function renderSections(sections) {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = sections.map(sec => {
    if(sec.type === 'hero') {
      return `
        <section class="section hero-section">
          <div class="container">
            ${sec.badge ? `<div class="hero-badge">${escapeHtml(sec.badge)}</div>` : ''}
            <h1 class="hero-title">${escapeHtml(sec.title)}</h1>
            <p class="hero-subtitle">${escapeHtml(sec.subtitle)}</p>
            <div class="hero-btns">
              ${sec.primary_btn_text ? `<a href="${sec.primary_btn_link||'#contact'}" class="btn-primary">${escapeHtml(sec.primary_btn_text)}</a>` : ''}
              ${sec.secondary_btn_text ? `<a href="${sec.secondary_btn_link||'#services'}" class="btn-secondary">${escapeHtml(sec.secondary_btn_text)}</a>` : ''}
            </div>
          </div>
        </section>
      `;
    } else if(sec.type === 'features' || sec.type === 'services') {
      const items = sec.items || [];
      return `
        <section class="section" id="services">
          <div class="container">
            <div class="section-header">
              <h2 class="section-title">${escapeHtml(sec.title)}</h2>
              ${sec.subtitle ? `<p class="section-subtitle">${escapeHtml(sec.subtitle)}</p>` : ''}
            </div>
            <div class="cards-grid">
              ${items.map(item => `
                <div class="card-item">
                  <div class="card-icon">${item.icon || '⭐'}</div>
                  <h3 class="card-title">${escapeHtml(item.title)}</h3>
                  <p class="card-desc">${escapeHtml(item.desc)}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
      `;
    } else if(sec.type === 'stats') {
      const items = sec.items || [];
      return `
        <section class="section">
          <div class="container">
            <div class="stats-grid">
              ${items.map(st => `
                <div class="stat-item">
                  <h3>${escapeHtml(st.number)}</h3>
                  <p>${escapeHtml(st.label)}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
      `;
    } else if(sec.type === 'testimonials') {
      const items = sec.items || [];
      return `
        <section class="section">
          <div class="container">
            <div class="section-header">
              <h2 class="section-title">${escapeHtml(sec.title || 'آراء العملاء')}</h2>
            </div>
            <div class="cards-grid">
              ${items.map(t => `
                <div class="card-item">
                  <div style="font-size:2rem;margin-bottom:10px">${t.avatar || '💬'}</div>
                  <p style="font-size:0.95rem;margin-bottom:12px;font-style:italic">"${escapeHtml(t.text)}"</p>
                  <h4 style="font-weight:800">${escapeHtml(t.name)}</h4>
                  <span style="font-size:0.8rem;color:var(--muted)">${escapeHtml(t.role)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
      `;
    } else if(sec.type === 'contact') {
      return `
        <section class="section" id="contact">
          <div class="container">
            <div class="section-header">
              <h2 class="section-title">${escapeHtml(sec.title || 'تواصل معنا')}</h2>
              <p class="section-subtitle">${escapeHtml(sec.subtitle || 'أرسل لنا استفساراتك وسنقوم بالرد عليك في أقرب وقت')}</p>
            </div>
            <div class="contact-container">
              <form id="contactForm" onsubmit="submitContactForm(event)">
                <div class="form-group">
                  <label>الاسم الكامل *</label>
                  <input type="text" id="senderName" required placeholder="مثال: أحمد علي">
                </div>
                <div class="form-group">
                  <label>البريد الإلكتروني *</label>
                  <input type="email" id="senderEmail" required placeholder="name@domain.com">
                </div>
                <div class="form-group">
                  <label>رقم الهاتف</label>
                  <input type="tel" id="senderPhone" placeholder="01xxxxxxxx">
                </div>
                <div class="form-group">
                  <label>الرسالة *</label>
                  <textarea id="senderMsg" rows="4" required placeholder="اكتب استفسارك هنا..."></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;justify-content:center" id="contactBtn">إرسال الرسالة 🚀</button>
              </form>
            </div>
          </div>
        </section>
      `;
    } else if(sec.type === 'footer') {
      document.getElementById('footerText').textContent = sec.text;
      return '';
    }
    return '';
  }).join('');
}

async function submitContactForm(e) {
  e.preventDefault();
  const btn = document.getElementById('contactBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الإرسال...';

  try {
    const res = await fetch(`/api/site/${siteSlug}/contact`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('senderName').value,
        email: document.getElementById('senderEmail').value,
        phone: document.getElementById('senderPhone').value,
        message: document.getElementById('senderMsg').value
      })
    });
    const result = await res.json();
    if(result.success) {
      alert('✅ ' + result.message);
      document.getElementById('contactForm').reset();
    } else {
      alert('❌ ' + (result.error || 'حدث خطأ أثناء الإرسال'));
    }
  } catch(err) {
    alert('❌ تعذر الاتصال بالسيرفر');
  }
  btn.disabled = false;
  btn.textContent = 'إرسال الرسالة 🚀';
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

loadPublicSite();
</script>
</body>
</html>
